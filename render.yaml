services:
  - type: web
    name: roadshield-rdc
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: ASSET_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: roadshield-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OCR_PYTHON_URL
        sync: false
      - key: OCR_PYTHON_HEALTH_URL
        sync: false
      - key: OCR_PYTHON_TIMEOUT
        value: 180
      - key: OCR_PYTHON_CONNECT_TIMEOUT
        value: 15
      - key: OCR_PYTHON_USE_OPENAI
        value: true
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: roadshield-ocr
    runtime: python
    plan: free
    autoDeploy: true
    rootDir: ocr_service
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OCR_LANGUAGE
        value: en

databases:
  - name: roadshield-db
    plan: free
